global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'console_logger'
  routes:
    - match:
        severity: critical
      receiver: 'console_logger'

receivers:
  - name: 'console_logger'
    webhook_configs:
      - url: 'http://ml_detector:8000/alert'
        send_resolved: true
